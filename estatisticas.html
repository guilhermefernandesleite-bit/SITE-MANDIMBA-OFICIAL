<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Estatísticas · Mandimba FC</title>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Cormorant+Infant:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400;1,600&display=swap" rel="stylesheet">
<style>
:root {
  --crimson:#9B1515; --crimson-light:#C01C1C;
  --black:#080808; --ink:#0E0E0E; --surface:#141414; --surface-2:#1C1C1C;
  --border:rgba(255,255,255,0.07); --border-red:rgba(155,21,21,0.35);
  --text:#E8E4DC; --text-dim:rgba(232,228,220,0.45); --text-mid:rgba(232,228,220,0.72);
  --gold:#C9A84C;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--black);color:var(--text);font-family:'EB Garamond',Georgia,serif;font-size:18px;overflow-x:hidden;-webkit-font-smoothing:antialiased;}

nav{position:sticky;top:0;z-index:200;height:64px;display:flex;align-items:center;justify-content:space-between;padding:0 56px;background:rgba(8,8,8,0.95);backdrop-filter:blur(18px);border-bottom:1px solid var(--border);}
.nav-logo{display:flex;align-items:center;gap:14px;text-decoration:none;}
.nav-logo img{height:36px;width:36px;object-fit:contain;}
.nav-logo-text{font-family:'Cormorant Infant',serif;font-weight:600;font-size:17px;letter-spacing:0.22em;text-transform:uppercase;color:var(--text);}
.nav-links{display:flex;gap:40px;list-style:none;}
.nav-links a{font-family:'EB Garamond',serif;font-size:13px;letter-spacing:0.18em;text-transform:uppercase;color:var(--text-dim);text-decoration:none;transition:color .25s;position:relative;}
.nav-links a::after{content:'';position:absolute;bottom:-4px;left:0;width:0;height:1px;background:var(--crimson);transition:width .3s;}
.nav-links a:hover,.nav-links a.active{color:var(--text);}
.nav-links a:hover::after,.nav-links a.active::after{width:100%;}
.nav-ig{display:flex;align-items:center;gap:8px;font-family:'EB Garamond',serif;font-size:13px;letter-spacing:0.12em;color:var(--text-dim);text-decoration:none;transition:color .25s;}
.nav-ig:hover{color:var(--text);}
.nav-ig svg{width:15px;height:15px;}

.page-header{padding:72px 72px 52px;border-bottom:1px solid var(--border);}
.eyebrow{display:flex;align-items:center;gap:16px;margin-bottom:20px;}
.eyebrow-line{width:36px;height:1px;background:var(--crimson);}
.eyebrow-text{font-size:11.5px;letter-spacing:0.35em;text-transform:uppercase;color:var(--crimson);font-family:'EB Garamond',serif;}
.page-title{font-family:'Cormorant Infant',serif;font-weight:300;font-size:clamp(52px,7vw,96px);line-height:0.9;letter-spacing:-0.01em;}
.page-title em{font-style:italic;color:var(--crimson-light);}

.main{max-width:1280px;margin:0 auto;padding:64px 72px 96px;}
.sec-label{font-size:11px;letter-spacing:0.35em;text-transform:uppercase;color:var(--crimson);margin-bottom:24px;display:flex;align-items:center;gap:12px;}
.sec-label::before{content:'';display:block;width:20px;height:1px;background:var(--crimson);}
.section-block{margin-bottom:72px;}

/* STAT CARDS */
.stat-cards{display:flex;flex-wrap:wrap;gap:1px;background:var(--border);border:1px solid var(--border);margin-bottom:64px;}.stat-cards .stat-card{flex:1 1 160px;}
.stat-card{background:var(--black);padding:28px 24px;text-align:center;}
.stat-card .num{font-family:'Cormorant Infant',serif;font-weight:300;font-size:3.2rem;color:var(--crimson);line-height:1;display:block;}
.stat-card .lbl{font-size:10px;letter-spacing:0.22em;text-transform:uppercase;color:var(--text-dim);opacity:0.6;margin-top:6px;display:block;}

/* ARTILHARIA */
.artilharia-list{display:flex;flex-direction:column;gap:0;}
.art-row{display:grid;grid-template-columns:40px 1fr auto auto auto;align-items:center;gap:20px;padding:16px 0;border-bottom:1px solid var(--border);transition:background .18s;}
.art-row:first-child{border-top:1px solid var(--border);}
.art-row:hover{background:rgba(255,255,255,.015);}
.art-pos{font-family:'Cormorant Infant',serif;font-style:italic;font-size:1.4rem;color:rgba(255,255,255,.15);text-align:center;}
.art-nome{font-family:'Cormorant Infant',serif;font-weight:600;font-size:1.1rem;letter-spacing:.05em;text-transform:uppercase;color:var(--text);}
.art-pos-tag{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--text-dim);opacity:.45;}
.art-val{font-family:'Cormorant Infant',serif;font-weight:600;font-size:1.5rem;text-align:center;min-width:40px;}
.art-val.gols{color:var(--crimson);}
.art-val.ast{color:var(--gold);}
.art-val.part{color:var(--text-mid);}

/* BAR */
.bar-wrap{margin-top:4px;}
.bar-track{height:2px;background:rgba(255,255,255,.06);position:relative;margin-top:6px;}
.bar-fill{height:100%;background:var(--crimson);transition:width .6s;}

/* TABELA COMPLETA */
table.pt{width:100%;border-collapse:collapse;font-size:14px;}
.pt thead tr{border-bottom:1px solid rgba(255,255,255,.1);}
.pt th{font-size:10px;letter-spacing:.25em;text-transform:uppercase;color:var(--text-dim);opacity:.4;padding:10px 14px;text-align:center;font-family:'EB Garamond',serif;font-weight:400;}
.pt th:nth-child(1){text-align:left;}
.pt tbody tr{border-bottom:1px solid var(--border);transition:background .18s;}
.pt tbody tr:hover{background:rgba(255,255,255,.02);}
.pt td{padding:14px;text-align:center;color:var(--text-mid);}
.pt td:first-child{text-align:left;font-family:'Cormorant Infant',serif;font-weight:600;font-size:1rem;letter-spacing:.04em;color:var(--text);}
.pt td.pos-tag{font-size:10px;letter-spacing:.15em;text-transform:uppercase;opacity:.4;}

.loading-state{text-align:center;padding:48px;font-style:italic;font-size:0.9rem;color:var(--text-dim);opacity:0.5;}

/* SORT TABS */
.sort-tabs{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;}
.sort-tab{font-family:'EB Garamond',serif;font-size:12px;letter-spacing:0.16em;text-transform:uppercase;color:var(--text-dim);background:transparent;border:1px solid var(--border);padding:6px 16px;cursor:pointer;transition:all .2s;}
.sort-tab:hover{border-color:var(--border-red);color:var(--text);}
.sort-tab.active{border-color:var(--crimson);color:var(--text);background:rgba(155,21,21,.1);}

footer{border-top:1px solid var(--border);padding:44px 72px;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:24px;}
.f-brand{font-family:'Cormorant Infant',serif;font-weight:600;font-size:15px;letter-spacing:.2em;text-transform:uppercase;color:var(--text-mid);}
.f-right{display:flex;justify-content:flex-end;align-items:center;gap:28px;}
.f-ig{display:flex;align-items:center;gap:8px;font-size:13px;letter-spacing:.15em;color:var(--text-dim);text-decoration:none;transition:color .25s;}
.f-ig:hover{color:var(--text);}
.f-copy{font-size:11.5px;color:var(--text-dim);opacity:.32;letter-spacing:.12em;}

@media(max-width:960px){
  nav{padding:0 24px;} .nav-links{display:none;}
  .page-header{padding:48px 24px 36px;}
  .main{padding:40px 24px 64px;}
  .art-row{grid-template-columns:32px 1fr auto;}
  .art-val.ast,.art-val.part{display:none;}
  footer{grid-template-columns:1fr;text-align:center;padding:32px 24px;}
  .f-right{justify-content:center;}
}

.destaques-section { margin-bottom: 72px; }
.destaques-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 1px;
  background: var(--border);
  border: 1px solid var(--border);
}
.destaque-card {
  background: var(--black);
  padding: 28px 24px;
  text-align: center;
  transition: background .2s;
  flex: 1 1 180px;
  min-width: 180px;
}
.destaque-card:hover { background: rgba(155,21,21,0.06); }
.destaque-icon { font-size: 1.8rem; margin-bottom: 10px; }
.destaque-titulo {
  font-size: 9px; letter-spacing: 0.25em; text-transform: uppercase;
  color: var(--text-dim); opacity: 0.5; margin-bottom: 10px;
}
.destaque-nome {
  font-family: 'Cormorant Infant', serif; font-weight: 600;
  font-size: 1.4rem; letter-spacing: 0.05em; text-transform: uppercase;
  color: var(--text); margin-bottom: 8px;
}
.destaque-val {
  font-family: 'Cormorant Infant', serif; font-style: italic;
  font-size: 1.8rem; color: var(--crimson); line-height: 1;
}
.destaque-lbl {
  font-size: 0.7rem; letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--text-dim); opacity: 0.5; font-style: normal;
  display: block; margin-top: 4px;
}

</style>

<script>
const CSV_JOGOS = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTx_tYrAv5hEef1kS-mvz1CfJvh_voKvOyiQ97Ybz4EynADCYdBbh5HmRlWuD5l4P800mu4pwUeP9RU/pub?gid=653989414&single=true&output=csv';
const CSV_JOGS  = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTx_tYrAv5hEef1kS-mvz1CfJvh_voKvOyiQ97Ybz4EynADCYdBbh5HmRlWuD5l4P800mu4pwUeP9RU/pub?gid=479712378&single=true&output=csv';

let _jogadores = [];
let _jogos = [];

function parseCSV(text) {
  return text.trim().split('\n').map(row => {
    const cols = []; let cur = '', inQ = false;
    for (let c of row) {
      if (c === '"') { inQ = !inQ; continue; }
      if (c === ',' && !inQ) { cols.push(cur.trim()); cur = ''; continue; }
      cur += c;
    }
    cols.push(cur.trim());
    return cols;
  });
}

function toObjects(rows, headerIdx) {
  const headers = rows[headerIdx].map(h => h.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim());
  return rows.slice(headerIdx + 1)
    .filter(r => r[0] && r[0].trim() !== '' && r[0].trim() !== 'TOTAL')
    .map(r => { const obj = {}; headers.forEach((h,i) => obj[h] = (r[i]||'').trim()); return obj; });
}

function n(v) { return Number(v) || 0; }

async function init() {
  try {
    const [rJogs, rJogos] = await Promise.all([
      fetch(CSV_JOGS  + '&t=' + Date.now(), {cache:'no-store'}),
      fetch(CSV_JOGOS + '&t=' + Date.now(), {cache:'no-store'})
    ]);

    _jogadores = toObjects(parseCSV(await rJogs.text()), 4);
    const hoje = new Date();
    hoje.setHours(0,0,0,0);
    _jogos = toObjects(parseCSV(await rJogos.text()), 4)
      .filter(j => {
        if (!j['resultado'] || j['resultado'] === '') return false;
        const partes = (j['data']||'').trim().split(' ')[0].split('/');
        if (partes.length === 3) {
          const dataJogo = new Date(parseInt(partes[2])+2000, parseInt(partes[1])-1, parseInt(partes[0]));
          if (dataJogo >= hoje) return false;
        }
        return true;
      });

    renderStatCards();
    renderArtilharia();
    renderPlayersTable(_jogadores, 'gols');
  } catch(e) {
    console.error('Erro:', e);
  }
}

function renderStatCards() {
  const totalGols  = _jogadores.reduce((s,j) => s + n(j['gols']), 0);
  const totalAss   = _jogadores.reduce((s,j) => s + n(j['assistencias']), 0);
  const totalJogos = _jogos.length;
  const vitorias   = _jogos.filter(j => j['resultado'].toLowerCase().includes('vit')).length;
  const derrotas   = _jogos.filter(j => j['resultado'].toLowerCase().includes('der')).length;
  const empates    = _jogos.filter(j => j['resultado'].toLowerCase().includes('emp')).length;
  const mediaGols  = totalJogos ? (totalGols/totalJogos).toFixed(1) : '—';
  const aproveit   = totalJogos ? Math.round((vitorias*3/(totalJogos*3))*100) + '%' : '—';

  // Destaques individuais
  const artilheiro  = [..._jogadores].sort((a,b) => n(b['gols'])-n(a['gols']))[0];
  const assistente  = [..._jogadores].sort((a,b) => n(b['assistencias'])-n(a['assistencias']))[0];
  const participativo = [..._jogadores].sort((a,b) => n(b['participacoes'])-n(a['participacoes']))[0];
  const indisciplinado = [..._jogadores].sort((a,b) => (n(b['cartoes amarelos'])+n(b['cartoes vermelhos']*3))-(n(a['cartoes amarelos'])+n(a['cartoes vermelhos']*3)))[0];
  const presenca    = [..._jogadores].sort((a,b) => n(b['partidas'])-n(a['partidas']))[0];

  document.getElementById('stat-cards').innerHTML = `
    <div class="stat-card"><span class="num">${totalGols}</span><span class="lbl">Gols marcados</span></div>
    <div class="stat-card"><span class="num">${mediaGols}</span><span class="lbl">Média gols/jogo</span></div>
    <div class="stat-card"><span class="num">${totalJogos}</span><span class="lbl">Jogos disputados</span></div>
    <div class="stat-card"><span class="num">${vitorias}</span><span class="lbl">Vitórias</span></div>
    <div class="stat-card"><span class="num">${empates}</span><span class="lbl">Empates</span></div>
    <div class="stat-card"><span class="num">${derrotas}</span><span class="lbl">Derrotas</span></div>
    <div class="stat-card"><span class="num">${aproveit}</span><span class="lbl">Aproveitamento</span></div>
    <div class="stat-card"><span class="num">${totalAss}</span><span class="lbl">Assistências</span></div>`;

  // Destaques individuais
  const destaques = [
    { titulo: 'Artilheiro', nome: artilheiro?.['nome']||'—', val: n(artilheiro?.['gols']), lbl: 'gols', icon: '⚽' },
    { titulo: 'Maior Assistente', nome: assistente?.['nome']||'—', val: n(assistente?.['assistencias']), lbl: 'assistências', icon: '🎯' },
    { titulo: 'Mais Participativo', nome: participativo?.['nome']||'—', val: n(participativo?.['participacoes']), lbl: 'participações', icon: '🏆' },
    { titulo: 'Mais Presente', nome: presenca?.['nome']||'—', val: n(presenca?.['partidas']), lbl: 'partidas', icon: '📅' },
    { titulo: 'Mais Indisciplinado', nome: indisciplinado?.['nome']||'—', val: n(indisciplinado?.['cartoes amarelos']), lbl: 'cartões', icon: '🟨' },
  ];

  const wrap = document.getElementById('destaques-wrap');
  if (wrap) {
    wrap.innerHTML = destaques.map(d => `
      <div class="destaque-card">
        <div class="destaque-icon">${d.icon}</div>
        <div class="destaque-titulo">${d.titulo}</div>
        <div class="destaque-nome">${d.nome}</div>
        <div class="destaque-val">${d.val} <span class="destaque-lbl">${d.lbl}</span></div>
      </div>`).join('');
  }
}

function renderArtilharia() {
  const sorted = [..._jogadores].sort((a,b) => n(b['gols'])-n(a['gols'])).slice(0,8);
  const maxGols = n(sorted[0]?.['gols']) || 1;
  document.getElementById('artilharia-wrap').innerHTML = sorted.map((j,i) => {
    const nome = j['nome']||'—';
    const pos  = j['posicao']||'—';
    const gols = n(j['gols']);
    const ast  = n(j['assistencias']);
    const part = n(j['participacoes']);
    const pct  = Math.round((gols/maxGols)*100);
    return `<div class="art-row">
      <span class="art-pos">${i+1}</span>
      <div>
        <div class="art-nome">${nome}</div>
        <div class="art-pos-tag">${pos}</div>
        <div class="bar-wrap"><div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div></div>
      </div>
      <span class="art-val gols" title="Gols">${gols}</span>
      <span class="art-val ast" title="Assistências">${ast}</span>
      <span class="art-val part" title="Participações">${part}</span>
    </div>`;
  }).join('');
}

function sortBy(campo, btn) {
  document.querySelectorAll('.sort-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const sorted = [..._jogadores].sort((a,b) => n(b[campo])-n(a[campo]));
  renderPlayersTable(sorted, campo);
}

function renderPlayersTable(jogadores, sortCampo) {
  if (!jogadores.length) {
    document.getElementById('players-table-wrap').innerHTML = '<div class="loading-state">Sem dados.</div>';
    return;
  }
  const rows = jogadores.map(j => {
    const nome  = j['nome']||'—';
    const pos   = j['posicao']||'—';
    const part  = j['partidas']||'0';
    const gols  = j['gols']||'0';
    const ast   = j['assistencias']||'0';
    const partic = j['participacoes']||'0';
    const ca    = j['cartoes amarelos']||j['cartoes_amarelos']||'0';
    const cv    = j['cartoes vermelhos']||j['cartoes_vermelhos']||'0';
    return `<tr>
      <td>${nome}</td>
      <td class="pos-tag">${pos}</td>
      <td>${part}</td>
      <td style="color:var(--crimson);font-weight:600">${gols}</td>
      <td style="color:var(--gold)">${ast}</td>
      <td>${partic}</td>
      <td style="color:#C9A84C;opacity:0.7">${ca}</td>
      <td style="color:var(--crimson-light)">${cv}</td>
    </tr>`;
  }).join('');

  document.getElementById('players-table-wrap').innerHTML = `
    <table class="pt">
      <thead><tr>
        <th>Jogador</th><th>Pos.</th>
        <th>Partidas</th><th>Gols</th><th>Assist.</th><th>Partic.</th>
        <th>CA</th><th>CV</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
}

init();
</script>
