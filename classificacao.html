<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Classificação · Mandimba FC</title>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Cormorant+Infant:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400;1,600&display=swap" rel="stylesheet">
<style>
:root {
  --crimson: #9B1515;
  --crimson-light: #C01C1C;
  --black: #080808;
  --ink: #0E0E0E;
  --surface: #141414;
  --surface-2: #1C1C1C;
  --border: rgba(255,255,255,0.07);
  --border-red: rgba(155,21,21,0.35);
  --text: #E8E4DC;
  --text-dim: rgba(232,228,220,0.45);
  --text-mid: rgba(232,228,220,0.72);
  --gold: #C9A84C;
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }
body {
  background:var(--black); color:var(--text);
  font-family:'EB Garamond',Georgia,serif; font-size:18px;
  overflow-x:hidden; -webkit-font-smoothing:antialiased;
}

/* NAV */
nav {
  position:sticky; top:0; z-index:200;
  height:64px; display:flex; align-items:center; justify-content:space-between;
  padding:0 56px;
  background:rgba(8,8,8,0.95); backdrop-filter:blur(18px);
  border-bottom:1px solid var(--border);
}
.nav-logo { display:flex; align-items:center; gap:14px; text-decoration:none; }
.nav-logo img { height:36px; width:36px; object-fit:contain; }
.nav-logo-text {
  font-family:'Cormorant Infant',serif; font-weight:600; font-size:17px;
  letter-spacing:0.22em; text-transform:uppercase; color:var(--text);
}
.nav-links { display:flex; gap:40px; list-style:none; }
.nav-links a {
  font-family:'EB Garamond',serif; font-size:13px; letter-spacing:0.18em;
  text-transform:uppercase; color:var(--text-dim); text-decoration:none;
  transition:color .25s; position:relative;
}
.nav-links a::after {
  content:''; position:absolute; bottom:-4px; left:0;
  width:0; height:1px; background:var(--crimson); transition:width .3s;
}
.nav-links a:hover, .nav-links a.active { color:var(--text); }
.nav-links a:hover::after, .nav-links a.active::after { width:100%; }
.nav-ig {
  display:flex; align-items:center; gap:8px;
  font-family:'EB Garamond',serif; font-size:13px; letter-spacing:0.12em;
  color:var(--text-dim); text-decoration:none; transition:color .25s;
}
.nav-ig:hover { color:var(--text); }
.nav-ig svg { width:15px; height:15px; }

/* PAGE HEADER */
.page-header {
  padding:72px 72px 52px;
  border-bottom:1px solid var(--border);
}
.eyebrow {
  display:flex; align-items:center; gap:16px; margin-bottom:20px;
}
.eyebrow-line { width:36px; height:1px; background:var(--crimson); }
.eyebrow-text {
  font-size:11.5px; letter-spacing:0.35em; text-transform:uppercase;
  color:var(--crimson); font-family:'EB Garamond',serif;
}
.page-title {
  font-family:'Cormorant Infant',serif; font-weight:300;
  font-size:clamp(52px,7vw,96px); line-height:0.9; letter-spacing:-0.01em;
}
.page-title em { font-style:italic; color:var(--crimson-light); }

/* MAIN */
.main { max-width:1280px; margin:0 auto; padding:64px 72px 96px; }

/* SECTION */
.sec-label {
  font-size:11px; letter-spacing:0.35em; text-transform:uppercase;
  color:var(--crimson); margin-bottom:24px;
  display:flex; align-items:center; gap:12px;
}
.sec-label::before { content:''; display:block; width:20px; height:1px; background:var(--crimson); }

/* CLASSIFICAÇÃO TABLE */
.section-block { margin-bottom:72px; }

table.st { width:100%; border-collapse:collapse; font-size:15px; }
.st thead tr { border-bottom:1px solid rgba(255,255,255,.1); }
.st th {
  font-size:10px; letter-spacing:.3em; text-transform:uppercase;
  color:var(--text-dim); opacity:.4; padding:12px 16px;
  text-align:center; font-family:'EB Garamond',serif; font-weight:400;
}
.st th:nth-child(2) { text-align:left; }
.st tbody tr { border-bottom:1px solid var(--border); transition:background .18s; }
.st tbody tr:hover { background:rgba(255,255,255,.022); }
.st tbody tr.me { background:rgba(155,21,21,.08); border-left:2px solid var(--crimson); }
.st td { padding:18px 16px; text-align:center; color:var(--text-mid); }
.st td:first-child {
  font-family:'Cormorant Infant',serif; font-weight:300;
  font-size:22px; color:rgba(255,255,255,.18); width:52px;
}
.st td:nth-child(2) {
  text-align:left; font-family:'Cormorant Infant',serif; font-weight:600;
  font-size:17px; letter-spacing:.05em; text-transform:uppercase; color:var(--text);
}
.st td:last-child {
  font-family:'Cormorant Infant',serif; font-weight:600;
  font-size:22px; color:var(--text);
}

/* RESULTADOS */
.result-row {
  display:grid;
  grid-template-columns:140px 1fr auto 1fr 120px;
  align-items:center; gap:28px;
  padding:22px 0; border-bottom:1px solid var(--border);
  transition:background .18s;
}
.result-row:first-child { border-top:1px solid var(--border); }
.result-row:hover { background:rgba(255,255,255,.015); }
.btn-detalhes {
  background: none;
  border: 1px solid var(--border);
  color: var(--text-dim);
  font-family: 'EB Garamond', serif;
  font-size: 11px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  padding: 4px 10px;
  cursor: pointer;
  margin-top: 6px;
  display: block;
  transition: all .2s;
}
.btn-detalhes:hover { border-color: rgba(255,255,255,0.2); color: var(--text); }
.btn-detalhes.open { color: var(--crimson-light); border-color: var(--border-red); }
.r-detalhes {
  grid-column: 1 / -1;
  font-size: 13px;
  color: rgba(232,228,220,0.55);
  letter-spacing: 0.05em;
  font-style: italic;
  padding: 10px 0 4px;
  border-top: 1px solid var(--border);
  margin-top: 8px;
  display: none;
}
.r-detalhes.open { display: block; }
.r-marcadores {
  grid-column: 1 / -1;
  font-size: 12px;
  color: rgba(232,228,220,0.4);
  letter-spacing: 0.05em;
  padding-top: 4px;
  font-style: italic;
}
.r-date-comp { display:flex; flex-direction:column; gap:4px; }
.r-date { font-size:14px; color:var(--text-dim); font-style:italic; }
.r-comp { font-size:10.5px; letter-spacing:.2em; text-transform:uppercase; color:var(--text-dim); opacity:.4; }
.r-team {
  font-family:'Cormorant Infant',serif; font-weight:600;
  font-size:18px; letter-spacing:.06em; text-transform:uppercase; color:var(--text);
}
.r-team.away { text-align:right; color:var(--text-mid); }
.r-score {
  font-family:'Cormorant Infant',serif; font-weight:600;
  font-size:26px; letter-spacing:.12em; text-align:center; white-space:nowrap;
}
.r-score.win  { color:#6BBF6B; }
.r-score.draw { color:var(--gold); }
.r-score.loss { color:var(--crimson-light); }
.r-badge { display:flex; justify-content:flex-end; }
.badge {
  font-size:9.5px; letter-spacing:.25em; text-transform:uppercase;
  padding:4px 12px; border:1px solid;
}
.badge.win  { color:#6BBF6B; border-color:rgba(107,191,107,.25); }
.badge.draw { color:var(--gold); border-color:rgba(201,168,76,.25); }
.badge.loss { color:var(--crimson-light); border-color:rgba(184,26,26,.25); }

/* FILTROS */
.filters {
  display:flex; gap:12px; margin-bottom:28px; flex-wrap:wrap;
}
.filter-btn {
  font-family:'EB Garamond',serif; font-size:12px; letter-spacing:0.18em;
  text-transform:uppercase; color:var(--text-dim);
  background:transparent; border:1px solid var(--border);
  padding:7px 18px; cursor:pointer; transition:all .2s;
}
.filter-btn:hover { border-color:var(--border-red); color:var(--text); }
.filter-btn.active { border-color:var(--crimson); color:var(--text); background:rgba(155,21,21,.1); }

/* LOADING */
.loading-state {
  text-align:center; padding:48px;
  font-style:italic; font-size:0.9rem; color:var(--text-dim); opacity:0.5;
}

/* FOOTER */
footer {
  border-top:1px solid var(--border); padding:44px 72px;
  display:grid; grid-template-columns:1fr auto 1fr; align-items:center; gap:24px;
}
.f-brand {
  font-family:'Cormorant Infant',serif; font-weight:600;
  font-size:15px; letter-spacing:.2em; text-transform:uppercase; color:var(--text-mid);
}
.f-right { display:flex; justify-content:flex-end; align-items:center; gap:28px; }
.f-ig {
  display:flex; align-items:center; gap:8px; font-size:13px;
  letter-spacing:.15em; color:var(--text-dim); text-decoration:none; transition:color .25s;
}
.f-ig:hover { color:var(--text); }
.f-copy { font-size:11.5px; color:var(--text-dim); opacity:.32; letter-spacing:.12em; }

@media(max-width:960px){
  nav{padding:0 24px;} .nav-links{display:none;}
  .page-header{padding:48px 24px 36px;}
  .main{padding:40px 24px 64px;}
  .result-row{grid-template-columns:1fr;gap:6px;padding:16px 0;}
  footer{grid-template-columns:1fr;text-align:center;padding:32px 24px;}
  .f-right{justify-content:center;}
}
</style>
</head>
<body>

<nav>
  <a class="nav-logo" href="index.html">
    <img src="LOGO_MANDIMBA_-_OFICIAL.png" alt="Mandimba FC" onerror="this.style.display='none'">
    <span class="nav-logo-text">Mandimba FC</span>
  </a>
  <ul class="nav-links">
    <li><a href="index.html">Início</a></li>
    <li><a href="classificacao.html" class="active">Classificação</a></li>
    <li><a href="estatisticas.html">Estatísticas</a></li>
    <li><a href="apostas.html">Fantasy</a></li>
    <li><a href="loja.html">Loja</a></li>
  </ul>
  <a class="nav-ig" href="https://instagram.com/mandimbafc" target="_blank">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <rect x="2" y="2" width="20" height="20" rx="5"/>
      <circle cx="12" cy="12" r="4"/>
      <circle cx="17.5" cy="6.5" r="0.8" fill="currentColor" stroke="none"/>
    </svg>
    @mandimbafc
  </a>
</nav>

<div class="page-header">
  <div class="eyebrow">
    <span class="eyebrow-line"></span>
    <span class="eyebrow-text" id="torneio-label">Copa Amstel · Série C</span>
  </div>
  <h1 class="page-title">Classifi<em>cação</em></h1>
</div>

<div class="main">

  <!-- CLASSIFICAÇÃO -->
  <div class="section-block">
    <p class="sec-label">Tabela</p>
    <div id="classificacao-wrap">
      <div class="loading-state">Carregando classificação…</div>
    </div>
  </div>

  <!-- TODOS OS JOGOS -->
  <div class="section-block">
    <p class="sec-label">Todos os jogos</p>

    <div class="filters">
      <button class="filter-btn active" data-filter="todos" onclick="filtrarJogos(this)">Todos</button>
      <button class="filter-btn" data-filter="Amistoso" onclick="filtrarJogos(this)">Amistosos</button>
      <button class="filter-btn" data-filter="Copa Amstel" onclick="filtrarJogos(this)">Copa Amstel</button>
      <button class="filter-btn" data-filter="Vitória" onclick="filtrarJogos(this)">Vitórias</button>
      <button class="filter-btn" data-filter="Derrota" onclick="filtrarJogos(this)">Derrotas</button>
      <button class="filter-btn" data-filter="Empate" onclick="filtrarJogos(this)">Empates</button>
    </div>

    <div id="jogos-wrap">
      <div class="loading-state">Carregando jogos…</div>
    </div>
  </div>

</div>

<footer>
  <span class="f-brand">Mandimba FC · Est. 2019</span>
  <div></div>
  <div class="f-right">
    <a class="f-ig" href="https://instagram.com/mandimbafc" target="_blank">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="15" height="15">
        <rect x="2" y="2" width="20" height="20" rx="5"/>
        <circle cx="12" cy="12" r="4"/>
        <circle cx="17.5" cy="6.5" r="0.8" fill="currentColor" stroke="none"/>
      </svg>
      @mandimbafc
    </a>
    <span class="f-copy">© 2026 Mandimba FC</span>
  </div>
</footer>




<script>
const CSV_JOGOS = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTx_tYrAv5hEef1kS-mvz1CfJvh_voKvOyiQ97Ybz4EynADCYdBbh5HmRlWuD5l4P800mu4pwUeP9RU/pub?gid=653989414&single=true&output=csv';
const CSV_CLASS = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTx_tYrAv5hEef1kS-mvz1CfJvh_voKvOyiQ97Ybz4EynADCYdBbh5HmRlWuD5l4P800mu4pwUeP9RU/pub?gid=627501198&single=true&output=csv';

let _todosJogos = [];

function parseCSV(text) {
  return text.trim().split('\n').map(row => {
    const cols = []; let cur = '', inQ = false;
    for (let c of row) {
      if (c === '"') { inQ = !inQ; continue; }
      if (c === ',' && !inQ) { cols.push(cur.trim()); cur = ''; continue; }
      cur += c;
    }
    cols.push(cur.trim());
    return cols;
  });
}

function toObjects(rows, headerIdx) {
  const headers = rows[headerIdx].map(h => h.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim());
  return rows.slice(headerIdx + 1)
    .filter(r => r[0] && r[0].trim() !== '' && r[0].trim() !== 'TOTAL')
    .map(r => { const obj = {}; headers.forEach((h,i) => obj[h] = (r[i]||'').trim()); return obj; });
}

async function init() {
  try {
    const [rJogos, rClass] = await Promise.all([
      fetch(CSV_JOGOS + '&t=' + Date.now(), {cache:'no-store'}),
      fetch(CSV_CLASS + '&t=' + Date.now(), {cache:'no-store'})
    ]);

    const jogos = toObjects(parseCSV(await rJogos.text()), 4);
    const classif = toObjects(parseCSV(await rClass.text()), 1);

    // Só jogos com resultado
    const hoje = new Date();
    hoje.setHours(0,0,0,0);
    _todosJogos = jogos.filter(j => {
      if (!j['resultado'] || j['resultado'] === '') return false;
      const partes = (j['data']||'').trim().split(' ')[0].split('/');
      if (partes.length === 3) {
        const dataJogo = new Date(parseInt(partes[2])+2000, parseInt(partes[1])-1, parseInt(partes[0]));
        if (dataJogo >= hoje) return false;
      }
      return true;
    });

    renderClassificacao(classif);
    renderJogos(_todosJogos);

    // Nome do torneio
    const torneios = [...new Set(_todosJogos.map(j => j['campeonato']).filter(Boolean))];
    const serie = torneios.find(t => /serie|serie/i.test(t));
    if (serie) {
      const el = document.getElementById('torneio-label');
      if (el) el.textContent = serie;
    }
  } catch(e) {
    console.error('Erro:', e);
  }
}

function renderClassificacao(cls) {
  const wrap = document.getElementById('classificacao-wrap');
  if (!cls.length) { wrap.innerHTML = '<div class="loading-state">Sem dados.</div>'; return; }
  let rows = '';
  cls.forEach((r, i) => {
    const time  = r['time'] || '—';
    const pts   = r['pontos'] || '0';
    const j2    = r['jogos'] || '0';
    const v     = r['vitorias'] || '0';
    const e     = r['empates'] || '0';
    const d     = r['derrotas'] || '0';
    const gp    = r['gols pro'] || '0';
    const gc    = r['gols contra'] || '0';
    const sg    = r['saldo de gols'] || '0';
    const aprov = r['aproveitamento'] || '—';
    const isMe  = time.toLowerCase().includes('mandimba');
    rows += `<tr class="${isMe?'me':''}">
      <td>${i+1}</td><td>${time}</td>
      <td>${j2}</td><td>${v}</td><td>${e}</td><td>${d}</td>
      <td>${gp}</td><td>${gc}</td><td>${sg}</td>
      <td>${aprov}</td><td>${pts}</td>
    </tr>`;
  });
  wrap.innerHTML = `<table class="st">
    <thead><tr>
      <th>#</th><th>Clube</th>
      <th>J</th><th>V</th><th>E</th><th>D</th>
      <th>GP</th><th>GC</th><th>SG</th>
      <th>Aprov.</th><th>Pts</th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

function renderJogos(jogos) {
  const wrap = document.getElementById('jogos-wrap');
  if (!jogos.length) { wrap.innerHTML = '<div class="loading-state">Nenhum jogo encontrado.</div>'; return; }
  wrap.innerHTML = jogos.map(j => {
    const res  = (j['resultado']||'').toLowerCase();
    const pm   = j['placar mandimba'] || '0';
    const pv   = j['placar visitante'] || '0';
    const adv  = j['adversario'] || '—';
    const data = j['data'] || '—';
    const camp = j['campeonato'] || '';
    let cls = 'draw', label = 'Empate';
    if (res.includes('vit')) { cls = 'win';  label = 'Vitória'; }
    if (res.includes('der')) { cls = 'loss'; label = 'Derrota'; }
    const marcadores = (j['marcadores']||'').split(',').map(m=>m.trim()).filter(Boolean);
    const uid = 'jogo-' + Math.random().toString(36).slice(2,8);

    // Conta gols por jogador
    const contagem = {};
    marcadores.forEach(m => { contagem[m] = (contagem[m]||0) + 1; });
    const marcadoresFormatados = Object.entries(contagem)
      .map(([nome, qtd]) => qtd > 1 ? `${nome} (${qtd})` : nome)
      .join(' · ');

    const btnDetalhes = marcadores.length
      ? `<button class="btn-detalhes" onclick="toggleDetalhes('${uid}')">ver gols ▾</button>`
      : '';
    const detalhesHTML = marcadores.length
      ? `<div class="r-detalhes" id="${uid}">⚽ ${marcadoresFormatados}</div>`
      : '';

    return `<div class="result-row" data-camp="${camp}" data-res="${label}">
      <div class="r-date-comp">
        <span class="r-date">${data}</span>
        <span class="r-comp">${camp}</span>
      </div>
      <span class="r-team">Mandimba</span>
      <span class="r-score ${cls}">${pm} — ${pv}</span>
      <span class="r-team away">${adv}</span>
      <div class="r-badge">
        <span class="badge ${cls}">${label}</span>
        ${btnDetalhes}
      </div>
      ${detalhesHTML}
    </div>`;
  }).join('');
}

function toggleDetalhes(uid) {
  const el = document.getElementById(uid);
  const btn = el?.previousElementSibling?.querySelector('.btn-detalhes') ||
              document.querySelector(`[onclick="toggleDetalhes('${uid}')"]`);
  if (!el) return;
  el.classList.toggle('open');
  if (btn) btn.classList.toggle('open');
  if (btn) btn.textContent = el.classList.contains('open') ? 'fechar ▴' : 'ver gols ▾';
}

function filtrarJogos(btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const f = btn.dataset.filter;
  if (f === 'todos') { renderJogos(_todosJogos); return; }
  const filtrado = _todosJogos.filter(j => {
    const camp = j['campeonato'] || '';
    const res  = j['resultado']  || '';
    if (f === 'Vitória' || f === 'Derrota' || f === 'Empate') return res.includes(f);
    return camp.includes(f);
  });
  renderJogos(filtrado);
}

init();
</script>
</body>
