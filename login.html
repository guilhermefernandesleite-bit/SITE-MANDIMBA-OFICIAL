<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Entrar - Mandimba FC</title>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;1,400&family=Cormorant+Infant:ital,wght@0,300;1,300&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--crimson:#9B1515;--cl:#C01C1C;--black:#080808;--ink:#0E0E0E;--surface:#141414;--border:rgba(255,255,255,0.07);--border-red:rgba(155,21,21,0.35);--text:#E8E4DC;--dim:rgba(232,228,220,0.45);}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--black);color:var(--text);font-family:'EB Garamond',serif;min-height:100vh;display:grid;grid-template-columns:1fr 1fr;-webkit-font-smoothing:antialiased;}
.left{background:var(--ink);border-right:1px solid var(--border);display:flex;flex-direction:column;justify-content:space-between;padding:56px;position:relative;overflow:hidden;}
.wm{position:absolute;bottom:-40px;left:-20px;font-family:'Cormorant Infant',serif;font-weight:700;font-size:220px;color:rgba(155,21,21,0.05);line-height:1;pointer-events:none;}
.logo{display:flex;align-items:center;gap:14px;text-decoration:none;}
.logo img{height:40px;width:40px;object-fit:contain;}
.logo-t{font-family:'Cormorant Infant',serif;font-weight:600;font-size:17px;letter-spacing:0.22em;text-transform:uppercase;color:var(--text);}
.lc{position:relative;z-index:1;}
.ey{display:flex;align-items:center;gap:14px;margin-bottom:24px;}
.eyl{width:28px;height:1px;background:var(--crimson);}
.eyt{font-size:11px;letter-spacing:0.35em;text-transform:uppercase;color:var(--crimson);}
.ltitle{font-family:'Cormorant Infant',serif;font-weight:300;font-size:clamp(48px,5vw,80px);line-height:0.9;margin-bottom:28px;}
.ltitle em{font-style:italic;color:var(--cl);}
.ldesc{font-size:15px;line-height:1.8;color:var(--dim);font-style:italic;max-width:360px;}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border);border:1px solid var(--border);position:relative;z-index:1;}
.stat{background:var(--ink);padding:20px 16px;text-align:center;}
.stat .n{font-family:'Cormorant Infant',serif;font-weight:600;font-size:2rem;color:var(--crimson);display:block;line-height:1;}
.stat .l{font-size:9px;letter-spacing:0.22em;text-transform:uppercase;color:var(--dim);opacity:0.5;display:block;margin-top:5px;}
.right{display:flex;flex-direction:column;justify-content:center;padding:56px;max-width:520px;margin:0 auto;width:100%;}
.tabs{display:flex;margin-bottom:40px;border-bottom:1px solid var(--border);}
.tab{font-family:'EB Garamond',serif;font-size:13px;letter-spacing:0.18em;text-transform:uppercase;color:var(--dim);background:transparent;border:none;padding:12px 24px 12px 0;cursor:pointer;transition:color .25s;position:relative;margin-right:24px;}
.tab::after{content:'';position:absolute;bottom:-1px;left:0;width:0;height:1px;background:var(--crimson);transition:width .3s;}
.tab.active{color:var(--text);}.tab.active::after{width:100%;}
.form{display:none;flex-direction:column;gap:20px;}.form.active{display:flex;}
.fg{display:flex;flex-direction:column;gap:8px;}
.fl{font-size:10px;letter-spacing:0.28em;text-transform:uppercase;color:var(--dim);opacity:0.6;}
.fi{background:var(--surface);border:1px solid var(--border);color:var(--text);font-family:'EB Garamond',serif;font-size:16px;padding:13px 16px;outline:none;transition:border-color .25s;width:100%;}
.fi:focus{border-color:var(--border-red);}.fi::placeholder{color:var(--dim);opacity:0.4;}
.cu{text-transform:uppercase;letter-spacing:0.15em;}
.fh{font-size:12px;color:var(--dim);opacity:0.5;font-style:italic;margin-top:-8px;}
.btn{font-family:'EB Garamond',serif;font-size:13px;letter-spacing:0.22em;text-transform:uppercase;color:#fff;background:var(--crimson);border:1px solid var(--crimson);padding:14px 36px;cursor:pointer;transition:background .25s;width:100%;margin-top:8px;}
.btn:hover{background:var(--cl);}.btn:disabled{opacity:0.5;cursor:default;}
.msg{font-size:13px;padding:12px 16px;border:1px solid;display:none;line-height:1.5;}
.msg.error{color:#ff6b6b;border-color:rgba(255,107,107,.25);background:rgba(255,107,107,.05);display:block;}
.msg.success{color:#6bbf6b;border-color:rgba(107,191,107,.25);background:rgba(107,191,107,.05);display:block;}
.foot{margin-top:32px;font-size:12px;color:var(--dim);opacity:0.4;text-align:center;letter-spacing:0.08em;}
.sp{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;margin-right:8px;vertical-align:middle;}
@keyframes spin{to{transform:rotate(360deg);}}
@media(max-width:768px){body{grid-template-columns:1fr;}.left{display:none;}.right{padding:40px 28px;max-width:100%;}}

/* ── MENU HAMBURGUER MOBILE ── */
.nav-hamburger {
  display: none;
  flex-direction: column;
  gap: 5px;
  cursor: pointer;
  padding: 8px;
  background: none;
  border: none;
  position: relative;
  z-index: 300;
}
.nav-hamburger span {
  display: block;
  width: 22px;
  height: 1.5px;
  background: var(--text);
  transition: all .3s;
}
.nav-mobile {
  display: none;
  position: fixed;
  top: 64px;
  left: 0;
  right: 0;
  background: rgba(8,8,8,0.98);
  backdrop-filter: blur(18px);
  border-bottom: 1px solid var(--border);
  z-index: 199;
  padding: 24px 24px;
  flex-direction: column;
  gap: 0;
}
.nav-mobile.open { display: flex; }
.nav-mobile a {
  font-family: 'EB Garamond', serif;
  font-size: 14px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--text-dim);
  text-decoration: none;
  padding: 14px 0;
  border-bottom: 1px solid var(--border);
  transition: color .25s;
}
.nav-mobile a:last-child { border-bottom: none; }
.nav-mobile a:hover, .nav-mobile a.active { color: var(--text); }

@media(max-width:960px){
  .nav-hamburger { display: flex; }
}

</style>
</head>
<body>
<div class="left">
  <a class="logo" href="index.html">
    <img src="LOGO_MANDIMBA_-_OFICIAL.png" alt="MFC" onerror="this.style.display='none'">
    <span class="logo-t">Mandimba FC</span>
  </a>
  <div class="lc">
    <div class="ey"><span class="eyl"></span><span class="eyt">Fundado em 2019</span></div>
    <h1 class="ltitle">Bem-vindo<br>ao <em>clube</em></h1>
    <p class="ldesc">Acesse sua conta para ver estatisticas, disputar o Fantasy e acompanhar o clube.</p>
  </div>
  <div class="stats">
    <div class="stat"><span class="n" id="sj">-</span><span class="l">Jogos</span></div>
    <div class="stat"><span class="n" id="sg">-</span><span class="l">Gols</span></div>
    <div class="stat"><span class="n" id="sv">-</span><span class="l">Vitorias</span></div>
  </div>
  <span class="wm" aria-hidden="true">MFC</span>
</div>
<div class="right">
  <div class="tabs">
    <button class="tab active" onclick="sw('login',this)">Entrar</button>
    <button class="tab" onclick="sw('cadastro',this)">Criar conta</button>
  </div>
  <form class="form active" id="form-login" onsubmit="doLogin(event)">
    <div id="msg-login"></div>
    <div class="fg"><label class="fl">E-mail</label><input type="email" class="fi" id="le" placeholder="seu@email.com" required></div>
    <div class="fg"><label class="fl">Senha</label><input type="password" class="fi" id="ls" placeholder="..." required></div>
    <button type="submit" class="btn" id="bl">Entrar</button>
  </form>
  <form class="form" id="form-cadastro" onsubmit="doCadastro(event)">
    <div id="msg-cadastro"></div>
    <div class="fg"><label class="fl">Codigo de convite</label><input type="text" class="fi cu" id="cc" placeholder="MANDIMBA-00" required maxlength="12"><span class="fh">Peca ao administrador do clube</span></div>
    <div class="fg"><label class="fl">Nome completo</label><input type="text" class="fi" id="cn" placeholder="Seu nome" required></div>
    <div class="fg"><label class="fl">Apelido</label><input type="text" class="fi" id="ca" placeholder="Ex: Arroz, Gamino..."></div>
    <div class="fg"><label class="fl">E-mail</label><input type="email" class="fi" id="ce" placeholder="seu@email.com" required></div>
    <div class="fg"><label class="fl">Senha</label><input type="password" class="fi" id="cs" placeholder="Minimo 6 caracteres" required minlength="6"></div>
    <button type="submit" class="btn" id="bc">Criar conta</button>
  </form>
  <div class="foot">Mandimba FC - Est. 2019 - Acesso exclusivo para membros</div>
</div>
<script>
const sb = supabase.createClient('https://psohvzcwxxiplstngzty.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBzb2h2emN3eHhpcGxzdG5nenR5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3NTE1NjMsImV4cCI6MjA5MTMyNzU2M30.5uYQWrFeVA1ffuTt6SNKVnPS-NoVkIVplB4ymw0VVOQ');

sb.auth.getSession().then(({data:{session}})=>{
  if(session){ const n=new URLSearchParams(window.location.search).get('next')||'index.html'; window.location.href=n; }
});

function sw(t,b){
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.form').forEach(x=>x.classList.remove('active'));
  b.classList.add('active');
  document.getElementById('form-'+t).classList.add('active');
}

function sm(id,tipo,txt){
  const e=document.getElementById(id);
  e.className='msg '+tipo;
  e.textContent=txt;
}

async function doLogin(e){
  e.preventDefault();
  const b=document.getElementById('bl');
  b.disabled=true;
  b.innerHTML='<span class="sp"></span>Entrando...';
  const{error}=await sb.auth.signInWithPassword({
    email:document.getElementById('le').value,
    password:document.getElementById('ls').value
  });
  if(error){
    sm('msg-login','error','E-mail ou senha incorretos.');
    b.disabled=false;b.textContent='Entrar';
    return;
  }
  sm('msg-login','success','Login realizado! Redirecionando...');
  const next = new URLSearchParams(window.location.search).get('next') || 'index.html';
  setTimeout(()=>window.location.href=next,1000);
}

async function doCadastro(e){
  e.preventDefault();
  const b=document.getElementById('bc');
  const convite=document.getElementById('cc').value.toUpperCase().trim();
  const nome=document.getElementById('cn').value.trim();
  const apelido=document.getElementById('ca').value.trim();
  const email=document.getElementById('ce').value.trim();
  const senha=document.getElementById('cs').value;

  b.disabled=true;
  b.innerHTML='<span class="sp"></span>Verificando convite...';

  const{data:cv,error:ce2}=await sb.from('convites').select('*').eq('codigo',convite).eq('usado',false).single();

  if(ce2||!cv){
    sm('msg-cadastro','error','Codigo invalido ou ja utilizado.');
    b.disabled=false;b.textContent='Criar conta';
    return;
  }

  b.innerHTML='<span class="sp"></span>Criando conta...';

  const{data:au,error:ae}=await sb.auth.signUp({email,password:senha});

  if(ae){
    sm('msg-cadastro','error',ae.message);
    b.disabled=false;b.textContent='Criar conta';
    return;
  }

  await sb.from('profiles').insert({id:au.user.id,nome,apelido:apelido||nome,creditos:100});
  await sb.from('convites').update({usado:true,usado_por:au.user.id}).eq('codigo',convite);

  sm('msg-cadastro','success','Conta criada! Voce recebeu 100 creditos. Redirecionando...');
  const next2 = new URLSearchParams(window.location.search).get('next') || 'index.html';
  setTimeout(()=>window.location.href=next2,1500);
}
</script>

<script>
function toggleMenu() {
  const menu = document.getElementById('nav-mobile');
  if (!menu) return;
  const isOpen = menu.classList.toggle('open');
  document.getElementById('nav-hamburger').style.opacity = isOpen ? '1' : '0.7';
}
</script>

</body>
</html>
